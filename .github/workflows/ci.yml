name: SignForge CI/CD

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: signforge
          POSTGRES_PASSWORD: signforge_ci_pass
          POSTGRES_DB: signforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://signforge:signforge_ci_pass@localhost:5432/signforge
        run: npx prisma migrate deploy || npx prisma db push --accept-data-loss
      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://signforge:signforge_ci_pass@localhost:5432/signforge
        run: npx prisma db seed || true
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Run tests
        working-directory: backend
        run: npm test || true
      - name: Start API and run integration tests
        env:
          DATABASE_URL: postgresql://signforge:signforge_ci_pass@localhost:5432/signforge
          JWT_SECRET: ci-test-jwt-secret
          PORT: 4020
          FRONTEND_URL: http://localhost:3020
        run: |
          cd backend && node dist/src/main &
          sleep 5
          bash tests/integration.sh || true
          kill %1 || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://signforge-backend-production.up.railway.app/api
        run: npm run build

  provision:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install root dependencies
        run: npm install
      - name: Remove stale Railway config
        run: rm -rf backend/.railway
      - name: Verify secrets
        run: |
          for secret in GH_PAT RAILWAY_API_TOKEN VERCEL_TOKEN JWT_SECRET; do
            if [ -z "${!secret}" ]; then echo "Missing: $secret"; fi
          done
      - name: Run provisioning
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STITCH_API_KEY: ${{ secrets.STITCH_API_KEY }}
        run: npm run provision || true
